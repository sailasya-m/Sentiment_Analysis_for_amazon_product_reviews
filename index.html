<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cream • Sentiment Analysis</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sentiment Analysis</h1>
            <p>A minimal deep learning tool for text classification.</p>
        </header>
        
        <main>
            <div class="input-section">
                <textarea id="text-input" placeholder="Enter your text here..."></textarea>
                <button id="analyze-btn" class="primary-btn">Analyze Sentiment</button>
            </div>
            
            <div id="result-card" class="result-card hidden">
                <div class="sentiment-indicator">
                    <span id="sentiment-label">Positive</span>
                </div>
                <div class="confidence-bar-container">
                    <div id="confidence-bar" class="confidence-bar"></div>
                </div>
                <p id="confidence-text">Confidence: 98%</p>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 Sentiment Analysis • Minimal Cream Design</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
